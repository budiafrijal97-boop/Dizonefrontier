<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dizonefrontier</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#070b17;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.card{
background:#111827;
padding:30px;
border-radius:25px;
width:100%;
max-width:380px;
text-align:center;
box-shadow:0 0 30px rgba(0,140,255,.15);
border:1px solid rgba(255,255,255,.08);
}

.logo{
font-size:34px;
font-weight:bold;
color:#2196f3;
margin-bottom:10px;
}

.tagline{
color:#9ca3af;
margin-bottom:25px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.google{
background:#2196f3;
color:white;
}

.email{
background:#ff7b00;
color:white;
}

.footer{
margin-top:20px;
font-size:12px;
color:#6b7280;
}
</style>
</head>

<body>

<div class="card">
<div class="logo">Dizonefrontier</div>

<p class="tagline">
Innovate The Next Horizon
</p>

<button class="google" onclick="loginGoogle()">
Login with Google
</button>

<button class="email">
Login Email
</button>

<div class="footer">
Marketplace Produk Digital
</div>
</div>

<script>
function loginGoogle(){
alert("Firebase login akan disambungkan berikutnya 🔐");
}
</script>

</body>
</html>
